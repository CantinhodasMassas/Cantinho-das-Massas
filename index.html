<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cantinho das Massas</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f5f5f5;
}

header{
    background:#6bbf59;
    color:white;
    text-align:center;
    padding:30px;
}

header h1{
    margin:0;
    font-size:38px;
}

header p{
    margin-top:10px;
}

.banner{
    text-align:center;
    padding:40px 20px;
    background:white;
}

.banner h2{
    color:#333;
}

.botao{
    background:#25D366;
    color:white;
    padding:15px 25px;
    text-decoration:none;
    border-radius:8px;
    display:inline-block;
    margin-top:15px;
}

.cardapio{
    padding:30px;
}

.produto{
    background:white;
    margin-bottom:20px;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.preco{
    color:#6bbf59;
    font-size:22px;
    font-weight:bold;
}
</style>
</head>

<body>

<header>
    <h1>🍝 Cantinho das Massas</h1>
    <p>Massas fresquinhas feitas com carinho</p>
</header>

<section class="banner">
    <h2>Peça pelo WhatsApp</h2>
    <p>Delivery e retirada</p>
    <a class="botao" href="#">Fazer Pedido</a>
</section>

<section class="cardapio">

    <div class="produto">
        <h3>Macarrão Bolonhesa 500ml</h3>
        <p>Molho caseiro e queijo ralado.</p>
        <div class="preco">R$ 14,99</div>
    </div>

    <div class="produto">
        <h3>Macarrão Molho Branco 750ml</h3>
        <p>Molho branco cremoso com queijo ralado.</p>
        <div class="preco">R$ 19,99</div>
    </div>

</section>

</body>
</html>
