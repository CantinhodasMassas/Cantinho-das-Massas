<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cantinho das Massas</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f5f5f5;
}

header{
    background:#6bbf59;
    color:white;
    text-align:center;
    padding:30px;
}

header h1{
    margin:0;
    font-size:38px;
}

header p{
    margin-top:10px;
}

.botao{
    background:#25D366;
    color:white;
    padding:15px 20px;
    text-decoration:none;
    border-radius:8px;
    display:inline-block;
    margin-top:10px;
}

.cardapio{
    padding:20px;
}

.produto{
    background:white;
    margin-bottom:20px;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
}
</style>

</head>

<body>

<header>
    <h1>🍝 Cantinho das Massas</h1>
    <p>Massas fresquinhas feitas com carinho</p>
</header>

<section class="cardapio">

    <!-- MONTE SUA MASSA -->
    <div class="produto">

        <img src="marmita-500ml.jpg" style="width:100%;">

        <div style="padding:15px;">

            <h2>🍝 Monte sua Massa</h2>
            <p>Escolha o tamanho e monte do seu jeito</p>

            <h3>Tamanho</h3>

           <button class="botao"
           onclick="adicionarAoCarrinho('Massa 500ml ',R$ 17,90')">
           500ml - R$ 17,90
           </button>

            <br>

             <button class="botao"
             onclick="adicionarAoCarrinho('Massa 750ml',24,90)">
             750ml - R$ 24,90
             </button>
            <br>

            <h3>Molhos</h3>

            <a class="botao"
            href="https://wa.me/5511910746095?text=Quero%20massa%20com%20molho%20bolonhesa">
            Bolonhesa
            </a>

            <br>

            <a class="botao"
            href="https://wa.me/5511910746095?text=Quero%20massa%20com%20molho%20branco">
            Molho Branco
            </a>

            <br><br>

            <a class="botao"
            href="https://wa.me/5511910746095?text=Quero%20finalizar%20meu%20pedido">
            Finalizar Pedido
            </a>

        </div>
    </div>
<div id="carrinho" style="background:white;padding:15px;margin-top:20px;border-radius:12px;">
    <h2>🛒 Seu Carrinho</h2>

    <div id="lista-carrinho">
        Nenhum item adicionado.
    </div>

    <h3 id="total">
        Total: R$ 0,00
    </h3>
</div>
</section>
</section>

<script src="script.js"></script>

</body>
</html>
