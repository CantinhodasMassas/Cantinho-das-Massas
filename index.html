<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cantinho das Massas</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f5f5f5;
}

header{
    background:#6bbf59;
    color:white;
    text-align:center;
    padding:25px;
}

header h1{
    margin:0;
    font-size:32px;
}

header p{
    margin:5px 0 0 0;
}

.cardapio{
    padding:20px;
}

.produto{
    background:white;
    margin-bottom:20px;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.produto img{
    width:100%;
    display:block;
}

.info{
    padding:15px;
}

.preco{
    font-size:20px;
    font-weight:bold;
    color:#6bbf59;
    margin:8px 0;
}

.botao{
    display:inline-block;
    background:#25D366;
    color:white;
    padding:12px 15px;
    text-decoration:none;
    border-radius:8px;
    margin-top:10px;
}
</style>
</head>

<body>

<header>
    <h1>🍝 Cantinho das Massas</h1>
    <p>Massas fresquinhas feitas com carinho</p>
</header>

<section class="cardapio">

    <!-- MARMITA 500ML -->
    <div class="produto">
       <img src="marmita-500ml.jpg" style="width:100%; border-radius:12px;">

        <div class="info">
            <h3>Marmita 500ml</h3>
            <p>Porção ideal para uma pessoa</p>

            <div class="preco">R$ 17,90</div>

            <a class="botao"
            href="https://wa.me/5511910746095?text=Quero%20Marmita%20500ml%20-%20R%24%2017,90">
            Adicionar ao pedido
            </a>
        </div>
    </div>

    <!-- MARMITA 750ML -->
    <div class="produto">
       <img src="marmita-750ml.jpg" style="width:100%; border-radius:12px;">

        <div class="info">
            <h3>Marmita 750ml</h3>
            <p>Porção reforçada</p>

            <div class="preco">R$ 24,90</div>

            <a class="botao"
            href="https://wa.me/5511910746095?text=Quero%20Marmita%20750ml%20-%20R%24%2024,90">
            Adicionar ao pedido
            </a>
        </div>
    </div>

</section>

</body>
</html>
